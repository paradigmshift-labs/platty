name: Static analysis bug report
description: Report a missing or incorrect route, model, relation, or cross-repository connection.
title: "[Static Analysis Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a source-grounded static-analysis problem.

        Do not include proprietary source code, credentials, secrets, personal data, or private repository URLs. Sanitize source snippets and logs before submitting them.

  - type: input
    id: platty_version
    attributes:
      label: Platty version
      description: Paste the output of `platty version`.
      placeholder: "platty ..."
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include your operating system and Node.js version.
      placeholder: "Example: macOS 15, Node.js 22.17.0"
    validations:
      required: true

  - type: dropdown
    id: ecosystem
    attributes:
      label: Language ecosystem
      options:
        - TypeScript / JavaScript
        - Java
        - Kotlin
        - Python
        - Dart / Flutter
        - Other
    validations:
      required: true

  - type: input
    id: stack_versions
    attributes:
      label: Frameworks, libraries, and versions
      placeholder: "Example: Spring Boot 3.x, JPA/Hibernate, Gradle 8.x"
    validations:
      required: true

  - type: dropdown
    id: repository_layout
    attributes:
      label: Repository layout
      options:
        - Single repository
        - Monorepo
        - Multi-module repository
        - Other
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: Enter the exact Platty command that exposed the problem.
      placeholder: "platty analyze --project <project>"
    validations:
      required: true

  - type: dropdown
    id: affected_output
    attributes:
      label: Affected static-analysis output
      options:
        - Route, screen, job, or event entry point
        - Model or schema
        - Database access relation
        - API or navigation relation
        - Event, queue, or schedule relation
        - External service relation
        - Cross-repository service-map connection
        - Analysis failure or crash
        - Other
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe the source-grounded fact or connection Platty should produce.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: Describe what Platty produced, omitted, or resolved incorrectly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Public example or sanitized reproduction
      description: Provide minimal reproduction steps and a public link or sanitized snippet when available.
    validations:
      required: true

  - type: textarea
    id: sanitized_logs
    attributes:
      label: Sanitized logs
      description: Paste only the relevant, sanitized error or warning output.
      render: shell

  - type: checkboxes
    id: safe_content
    attributes:
      label: Sensitive-data confirmation
      options:
        - label: I confirm that this issue contains no proprietary source code, credentials, secrets, personal data, or private repository URLs.
          required: true
